<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Ramiro Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        h1, .font-brand { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-3 sm:p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-[1.5rem] sm:rounded-[2.5rem] shadow-2xl overflow-hidden border-b-8 border-[#0056b3] p-6 sm:p-8 md:p-12">
            <div class="text-center mb-7 sm:mb-10">
                <img src="logo.jpeg" alt="Logo" class="h-16 sm:h-20 mx-auto mb-3 sm:mb-4 rounded-2xl shadow-md">
                <h1 class="text-xl sm:text-2xl font-black uppercase italic tracking-tighter">
                    Acceso <span class="text-[#0056b3]">Admin</span>
                </h1>
                <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mt-1.5 sm:mt-2">Ramiro Ventas</p>
            </div>

            <form id="login-form" class="space-y-4 sm:space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1.5 block tracking-widest ml-1">Email</label>
                    <div class="relative">
                        <input type="email" id="email" required autocomplete="email"
                            class="w-full bg-slate-50 p-3.5 sm:p-4 rounded-2xl border-2 border-slate-100 focus:border-[#0056b3] outline-none font-bold transition-all pl-11 sm:pl-12 text-sm sm:text-base"
                            placeholder="admin@ramiroventas.com">
                        <i class="fa-solid fa-envelope absolute left-3.5 sm:left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1.5 block tracking-widest ml-1">Contraseña</label>
                    <div class="relative">
                        <input type="password" id="password" required autocomplete="current-password"
                            class="w-full bg-slate-50 p-3.5 sm:p-4 rounded-2xl border-2 border-slate-100 focus:border-[#0056b3] outline-none font-bold transition-all pl-11 sm:pl-12 text-sm sm:text-base"
                            placeholder="••••••••">
                        <i class="fa-solid fa-lock absolute left-3.5 sm:left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 transition-colors">
                            <i class="fa-solid fa-eye text-sm" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btn-login"
                    class="w-full bg-[#0056b3] text-white py-3.5 sm:py-4 rounded-2xl font-black italic uppercase tracking-widest hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-blue-100 mt-3 sm:mt-4 flex items-center justify-center gap-3 text-sm sm:text-base">
                    <span>Ingresar</span>
                    <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </form>
            <div id="error-msg" class="hidden mt-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-xl text-red-600 text-xs font-bold animate-pulse"></div>
        </div>
        <p class="text-center mt-8 text-[10px] font-black uppercase text-slate-400 tracking-widest">Hostara</p>
    </div>
    <script type="module" src="login.js"></script>
    <script>
        // Toggle mostrar/ocultar contraseña
        document.getElementById('toggle-password').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>
</html>
